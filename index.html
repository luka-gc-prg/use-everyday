<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Everyday</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0a0a0a;color:#ece9e2;position:relative;
  }
  body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(200,169,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

  /* ===== LOCKSCREEN ===== */
  #lockscreen{
    position:fixed;inset:0;z-index:1000;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:14vh 24px 8vh;
    touch-action:none;user-select:none;
    transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease;
  }
  #lockscreen.dragging{transition:none}
  #lockscreen.unlocked{transform:translateY(-100%);opacity:0;pointer-events:none}

  .lock-top{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:4vh}
  .lock-logo{display:flex;align-items:center;justify-content:center}
  .lock-clock{width:64px;height:64px;border-radius:50%;border:2px solid #c8a96e;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
  .lock-clock::before{content:"";position:absolute;width:2px;height:18px;background:#c8a96e;top:10px;left:50%;transform:translateX(-50%);transform-origin:bottom center;border-radius:2px;animation:lockHourHand 8s linear infinite}
  .lock-clock::after{content:"";position:absolute;width:2px;height:14px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:2px;animation:lockMinHand 4s linear infinite}
  @keyframes lockHourHand{0%{transform:translateX(-50%) rotate(0deg)}100%{transform:translateX(-50%) rotate(360deg)}}
  @keyframes lockMinHand{0%{transform:translateX(-50%) translateY(-100%) rotate(55deg)}100%{transform:translateX(-50%) translateY(-100%) rotate(415deg)}}
  .lock-brand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.07em;color:#f5f2ed}
  .lock-date{font-size:12.5px;letter-spacing:.1em;color:#8a8078;text-transform:uppercase;margin-top:-4px}

  .lock-middle{flex:1;display:flex;align-items:center;justify-content:center}
  .lock-status{font-size:12px;letter-spacing:.08em;color:#7c7a73;text-align:center;min-height:18px;transition:opacity .2s}

  .lock-swipe-zone{
    display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:300px;
  }
  .lock-swipe-hint{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8a744a;
    display:flex;align-items:center;gap:8px;opacity:.85;
  }
  .lock-chevrons{display:flex;flex-direction:column;gap:1px;line-height:1}
  .lock-chevrons span{font-size:13px;color:#c8a96e;animation:chevronPulse 1.6s ease-in-out infinite}
  .lock-chevrons span:nth-child(2){animation-delay:.15s;opacity:.6}
  .lock-chevrons span:nth-child(3){animation-delay:.3s;opacity:.3}
  @keyframes chevronPulse{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-4px);opacity:1}}

  .lock-track{
    position:relative;width:100%;height:64px;border-radius:32px;
    background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.25);
    display:flex;align-items:center;padding:6px;overflow:hidden;
  }
  .lock-track-fill{
    position:absolute;inset:6px;border-radius:26px;
    background:linear-gradient(180deg,rgba(200,169,110,.35),rgba(200,169,110,.15));
    width:0;transition:width .05s linear;
  }
  .lock-track-label{
    position:absolute;left:0;right:0;text-align:center;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#c8a96e;
    pointer-events:none;opacity:.75;
  }
  .lock-handle{
    position:relative;z-index:2;width:52px;height:52px;border-radius:50%;
    background:#c8a96e;display:flex;align-items:center;justify-content:center;
    cursor:grab;touch-action:none;flex-shrink:0;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
    transition:transform .05s linear;
  }
  .lock-handle:active{cursor:grabbing}
  .lock-handle svg{width:20px;height:20px}

  /* ===== LOGIN ===== */
  #loginScreen{
    position:fixed;inset:0;z-index:900;
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;pointer-events:none;transition:opacity .35s ease;
  }
  #loginScreen.show{opacity:1;pointer-events:auto}
  .login-box{width:100%;max-width:340px;text-align:center}
  .login-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:30px}
  .login-clockicon{width:30px;height:30px;border-radius:50%;border:1.6px solid #c8a96e;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
  .login-clockicon::before{content:"";position:absolute;width:1.4px;height:8px;background:#c8a96e;top:5px;left:50%;transform:translateX(-50%);transform-origin:bottom center;border-radius:1px}
  .login-clockicon::after{content:"";position:absolute;width:1.4px;height:6px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:1px}
  .login-brand-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.04em;color:#f5f2ed}
  .login-sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a744a;margin-bottom:26px}
  #loginScreen input[type=password]{
    width:100%;padding:14px 16px;border-radius:10px;border:1px solid #2a2a2a;
    background:#15140f;color:#ece9e2;font-size:15px;margin-bottom:14px;outline:none;
    transition:.15s;font-family:'DM Sans',sans-serif;
  }
  #loginScreen input[type=password]:focus{border-color:#c8a96e}
  #loginScreen button{
    width:100%;padding:14px;border-radius:10px;border:none;
    background:#c8a96e;color:#1a1408;font-size:14px;font-weight:500;
    cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;
  }
  #loginScreen button:hover{background:#d8b97a}
  #loginScreen button:disabled{opacity:.5;cursor:default}
  .login-err{color:#c47b6e;font-size:12.5px;margin-top:14px;min-height:16px}
  .login-timeout{color:#7aa6d6;font-size:12.5px;margin-top:14px;min-height:16px}
  .login-back{background:none;border:none;color:#7c7a73;font-size:11.5px;letter-spacing:.08em;margin-top:18px;cursor:pointer;padding:6px}
  .login-back:hover{color:#ece9e2}
  label.remember{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:16px;font-size:12.5px;color:#7c7a73;cursor:pointer}
  label.remember input{accent-color:#c8a96e;cursor:pointer}
</style>
</head>
<body>

<div id="lockscreen">
  <div class="lock-top">
    <div class="lock-clock"></div>
    <div class="lock-brand">EVERYDAY</div>
    <div class="lock-date" id="lockDate">—</div>
  </div>
  <div class="lock-middle">
    <div class="lock-status" id="lockStatus"></div>
  </div>
  <div class="lock-swipe-zone">
    <div class="lock-swipe-hint">
      <div class="lock-chevrons"><span>︿</span><span>︿</span><span>︿</span></div>
      <span>Nach oben wischen zum Entsperren</span>
    </div>
    <div class="lock-track" id="lockTrack">
      <div class="lock-track-fill" id="lockTrackFill"></div>
      <div class="lock-track-label" id="lockTrackLabel">Entsperren</div>
      <div class="lock-handle" id="lockHandle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1408" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </div>
    </div>
  </div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-clockicon"></div>
      <span class="login-brand-name">EVERYDAY</span>
    </div>
    <p class="login-sub">Geschützter Bereich</p>
    <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
    <button id="go">Entsperren</button>
    <label class="remember"><input type="checkbox" id="remember" checked> Angemeldet bleiben (15 Min. Inaktivität)</label>
    <div class="login-err" id="err"></div>
    <div class="login-timeout" id="timeoutMsg"></div>
    <button class="login-back" id="backToLock">← Zurück</button>
  </div>
</div>

function hexToBytes(hex) { const b=new Uint8Array(hex.length/2); for(let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.substr(i,2),16); return b; }
function b64ToBytes(b64) { const bin=atob(b64); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
async function deriveKey(password, saltBytes) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:saltBytes, iterations:600000, hash:"SHA-256"}, km, {name:"AES-CBC", length:256}, false, ["decrypt"]);
}
async function tryDecrypt(password) {
  const key = await deriveKey(password, hexToBytes(SALT_HEX));
  const dec = await crypto.subtle.decrypt({name:"AES-CBC", iv:hexToBytes(IV_HEX)}, key, b64ToBytes(ENC_B64));
  return new TextDecoder().decode(dec);
}

function refreshExpiry() { try { localStorage.setItem(EXPIRY_KEY, String(Date.now() + TIMEOUT_MS)); } catch(e) {} }
function clearSession() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(EXPIRY_KEY); } catch(e) {} }
function isSessionExpired() {
  let exp = null;
  try { exp = localStorage.getItem(EXPIRY_KEY); } catch(e) { return true; }
  if (!exp) return true;
  return Date.now() > Number(exp);
}
function startActivityWatcher() {
  refreshExpiry();
  const events = ["mousedown","mousemove","keydown","scroll","touchstart","click"];
  let throttle = false;
  const onActivity = () => {
    if (throttle) return;
    throttle = true;
    setTimeout(() => { throttle = false; }, 5000);
    refreshExpiry();
  };
  events.forEach(ev => document.addEventListener(ev, onActivity, {passive:true}));
  setInterval(() => {
    if (isSessionExpired()) { clearSession(); location.reload(); }
  }, 10000);
}

async function attemptUnlock(password) {
  const errEl = document.getElementById("err");
  const btn = document.getElementById("go");
  btn.disabled = true; btn.textContent = "Wird geprüft …"; errEl.textContent = "";
  try {
    const decrypted = await tryDecrypt(password);
    try { localStorage.setItem(STORAGE_KEY, password); } catch(e) {}
    refreshExpiry();
    document.open(); document.write(decrypted); document.close();
    startActivityWatcher();
  } catch (e) {
    errEl.textContent = "Falsches Passwort. Bitte erneut versuchen.";
    btn.disabled = false; btn.textContent = "Entsperren";
  }
}

function showLogin() {
  document.getElementById("lockscreen").classList.add("unlocked");
  setTimeout(() => {
    document.getElementById("loginScreen").classList.add("show");
    document.getElementById("pw").focus();
  }, 250);
}
function showLock() {
  document.getElementById("loginScreen").classList.remove("show");
  const lock = document.getElementById("lockscreen");
  lock.classList.remove("unlocked");
  resetTrack();
}

document.getElementById("go").addEventListener("click", () => {
  const pw = document.getElementById("pw").value;
  if (pw) attemptUnlock(pw);
});
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("go").click();
});
document.getElementById("backToLock").addEventListener("click", showLock);

function setLockDate() {
  const el = document.getElementById("lockDate");
  if (!el) return;
  const now = new Date();
  const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  el.textContent = days[now.getDay()] + ", " + now.getDate() + ". " + months[now.getMonth()];
}
setLockDate();

const track = document.getElementById("lockTrack");
const handle = document.getElementById("lockHandle");
const trackFill = document.getElementById("lockTrackFill");
const trackLabel = document.getElementById("lockTrackLabel");
const lockscreenEl = document.getElementById("lockscreen");
let dragging = false, startY = 0, currentY = 0, trackHeight = 0, maxDrag = 0;

function getMaxDrag() {
  return track.clientWidth - handle.clientWidth - 12;
}

function resetTrack() {
  handle.style.transform = "translateX(0)";
  trackFill.style.width = "0px";
  trackLabel.style.opacity = "0.75";
}

function onDragStart(clientY, clientX) {
  dragging = true;
  startY = clientY;
  startXClient = clientX;
  maxDrag = getMaxDrag();
  lockscreenEl.classList.add("dragging");
}
let startXClient = 0;
function onDragMove(clientY, clientX) {
  if (!dragging) return;
  const dy = startY - clientY;
  const dx = clientX - startXClient;
  const progress = Math.max(0, Math.min(1, dy / 140));
  const handleX = Math.max(0, Math.min(maxDrag, dx));
  handle.style.transform = "translateX(" + handleX + "px)";
  trackFill.style.width = (handleX + handle.clientWidth) + "px";
  trackLabel.style.opacity = String(0.75 - progress * 0.6);

  const totalDrag = Math.max(progress, handleX / maxDrag);
  if (dy > 100 || handleX > maxDrag * 0.85) {
    completeUnlock();
  } else {
    lockscreenEl.style.transform = "translateY(" + (-dy * 0.6) + "px)";
    lockscreenEl.style.opacity = String(1 - progress * 0.5);
  }
}
function onDragEnd() {
  if (!dragging) return;
  dragging = false;
  lockscreenEl.classList.remove("dragging");
  if (!lockscreenEl.classList.contains("unlocked")) {
    lockscreenEl.style.transform = "";
    lockscreenEl.style.opacity = "";
    resetTrack();
  }
}
function completeUnlock() {
  if (lockscreenEl.classList.contains("unlocked")) return;
  dragging = false;
  lockscreenEl.style.transform = "";
  lockscreenEl.style.opacity = "";
  showLogin();
}

handle.addEventListener("mousedown", e => { onDragStart(e.clientY, e.clientX); e.preventDefault(); });
window.addEventListener("mousemove", e => onDragMove(e.clientY, e.clientX));
window.addEventListener("mouseup", onDragEnd);

handle.addEventListener("touchstart", e => { const t = e.touches[0]; onDragStart(t.clientY, t.clientX); }, {passive:true});
window.addEventListener("touchmove", e => { const t = e.touches[0]; onDragMove(t.clientY, t.clientX); }, {passive:true});
window.addEventListener("touchend", onDragEnd);

let lockSwipeStartY = null;
lockscreenEl.addEventListener("touchstart", e => {
  if (e.target.closest("#lockHandle")) return;
  lockSwipeStartY = e.touches[0].clientY;
}, {passive:true});
lockscreenEl.addEventListener("touchmove", e => {
  if (lockSwipeStartY === null || e.target.closest("#lockHandle")) return;
  const dy = lockSwipeStartY - e.touches[0].clientY;
  const progress = Math.max(0, Math.min(1, dy / 160));
  lockscreenEl.style.transform = "translateY(" + (-dy * 0.5) + "px)";
  lockscreenEl.style.opacity = String(1 - progress * 0.5);
  if (dy > 120) { lockSwipeStartY = null; completeUnlock(); }
}, {passive:true});
lockscreenEl.addEventListener("touchend", () => {
  if (lockSwipeStartY !== null && !lockscreenEl.classList.contains("unlocked")) {
    lockscreenEl.style.transform = "";
    lockscreenEl.style.opacity = "";
  }
  lockSwipeStartY = null;
}, {passive:true});

document.getElementById("lockscreen").addEventListener("wheel", e => {
  if (e.deltaY < -30) completeUnlock();
}, {passive:true});

(function() {
  if (location.hash === "#logout") {
    clearSession();
    history.replaceState(null, "", location.pathname);
    return;
  }
  let hadSaved = false;
  try { hadSaved = !!localStorage.getItem(STORAGE_KEY); } catch(e) {}
  if (isSessionExpired()) {
    clearSession();
    if (hadSaved) {
      document.getElementById("lockStatus").textContent = "Sitzung wegen Inaktivität beendet";
    }
    return;
  }
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      document.getElementById("lockStatus").textContent = "Wird automatisch entsperrt …";
      attemptUnlock(saved);
      lockscreenEl.classList.add("unlocked");
    }
  } catch(e) {}
})();
</script>
</body>
